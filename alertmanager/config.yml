global:
  smtp_smarthost: 'smtpd:25'
  smtp_from: 'alertmanager@stevenc4.com'
  smtp_require_tls: false

route:
    group_by: ['alertname', 'hostname']
    group_interval: 2m
    group_wait: 30s
    receiver: 'email'
    repeat_interval: 2h
    routes:
      # NightHawk22 extractor: auth breakage -> email (needs a keyboard),
      # everything else (data staleness, run errors) -> Slack.
      - matchers:
          - service="nh22-extractor"
        receiver: 'nh22-slack'
        group_by: ['alertname', 'source']
        routes:
          - matchers:
              - kind="auth"
            receiver: 'email'
            repeat_interval: 1h

receivers:
  - name: 'email'
    email_configs:
    - to: 'stevencarroll90@gmail.com'
      from: 'alertmanager@stevenc4.com'
      smarthost: 'smtpd:25'

  # NightHawk22 data/error alerts. Replace api_url with your Slack incoming webhook.
  - name: 'nh22-slack'
    slack_configs:
    # Webhook URL is read from a git-ignored file so the secret never enters git.
    # Create alertmanager/slack_webhook_url on the host with the hooks.slack.com URL.
    - api_url_file: '/etc/alertmanager/slack_webhook_url'
      channel: '#nh22-alerts'
      send_resolved: true
      title: '{{ .CommonAnnotations.summary }}'
      text: >-
        {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* {{ .Annotations.description }}
        {{ if .Annotations.runbook }}
        *Runbook:* {{ .Annotations.runbook }}{{ end }}
        {{ end }}
